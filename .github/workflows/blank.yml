name: separation-theorem-pure-proof

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          # We only need the core MLX library! No massive model weights required.
          "${VENV_DIR}/bin/python" -m pip install mlx numpy

      - name: Execute Pure Empirical Proof
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/pure_proof.py
          import mlx.core as mx
          import mlx.nn as nn
          import numpy as np

          # 1. Define a pure unquantized network
          class TinyNet(nn.Module):
              def __init__(self, input_dim, output_dim):
                  super().__init__()
                  self.layer1 = nn.Linear(input_dim, 32)
                  self.layer2 = nn.Linear(32, output_dim)
                  
              def __call__(self, x):
                  x = nn.relu(self.layer1(x))
                  return self.layer2(x)

          # 2. Setup the Arena
          INPUT_DIM = 10
          VOCAB_DIM = 50
          BATCH_SIZE = 4
          LEARNING_RATE = 1e-3

          teacher = TinyNet(INPUT_DIM, VOCAB_DIM)
          student = TinyNet(INPUT_DIM, VOCAB_DIM)

          # Create synthetic data
          np.random.seed(42)
          X = mx.array(np.random.randn(BATCH_SIZE, INPUT_DIM).astype(np.float32))

          # The teacher establishes the ground truth distribution
          t_logits = teacher(X)
          # Hard targets are the argmax (the "correct" final answers)
          hard_targets = mx.argmax(t_logits, axis=-1)

          # ------------------------------------------------------------
          # Loss Functions
          # ------------------------------------------------------------
          def kl_loss(s_logits, t_logits):
              t_logprobs = t_logits - mx.logsumexp(t_logits, axis=-1, keepdims=True)
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              t_probs = mx.softmax(t_logits, axis=-1)
              return mx.mean(mx.sum(t_probs * (t_logprobs - s_logprobs), axis=-1))

          def ce_loss(s_logits, target_ids):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              target_mask = mx.zeros_like(s_logits)
              for i, idx in enumerate(target_ids.tolist()):
                  target_mask[i, idx] = 1.0
              return -mx.mean(mx.sum(target_mask * s_logprobs, axis=-1))

          # ------------------------------------------------------------
          # The Comparative Runs
          # ------------------------------------------------------------
          def train_student(mode="KL"):
              # Fresh student for every run
              student = TinyNet(INPUT_DIM, VOCAB_DIM)
              params = student.parameters()
              
              def loss_fn(p):
                  student.update(p)
                  s_logits = student(X)
                  if mode == "KL":
                      return kl_loss(s_logits, t_logits)
                  else:
                      return ce_loss(s_logits, hard_targets)
                      
              grad_fn = mx.value_and_grad(loss_fn)
              
              losses = []
              for epoch in range(5):
                  loss, grads = grad_fn(params)
                  
                  # Standard SGD
                  for k in params.keys():
                      params[k] = params[k] - LEARNING_RATE * grads[k]
                      
                  mx.eval(params)
                  losses.append(loss.item())
                  
              return losses

          print("\n[RUN] Running Approach B (Hard Targets - Cross-Entropy)")
          ce_results = train_student(mode="CE")
          for i, loss in enumerate(ce_results):
              print(f" Epoch {i+1}: Loss = {loss:.6f}")

          print("\n[RUN] Running Approach A (Soft Targets - KL Divergence)")
          kl_results = train_student(mode="KL")
          for i, loss in enumerate(kl_results):
              print(f" Epoch {i+1}: Loss = {loss:.6f}")

          # 3. Prove the Theorem
          ce_delta = ce_results[0] - ce_results[-1]
          kl_delta = kl_results[0] - kl_results[-1]

          print("\n############################################################")
          print(f"Approach B (Hard Targets) Total Decay: {ce_delta:.6f}")
          print(f"Approach A (Soft Targets) Total Decay: {kl_delta:.6f}")
          print("############################################################")
          if kl_delta > ce_delta:
              print("[PROOF SUCCESS] Soft targets yielded a faster/deeper optimization drop.")
          else:
              print("[PROOF FAIL] Check learning rates or dimensions.")
          print("############################################################")
          EOF

          "${VENV_DIR}/bin/python" scripts/pure_proof.py
