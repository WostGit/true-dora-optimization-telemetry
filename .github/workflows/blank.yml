name: separation-theorem-extensive-preliminaries

on:
  workflow_dispatch:

jobs:
  probe-environment:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Massive Diagnostics
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/probe.py
          import sys
          import time
          import mlx.core as mx
          from mlx_lm import load

          print("=== DIAGNOSTIC 1: MLX Environment ===")
          print(f"Python version: {sys.version}")
          print(f"MLX default device: {mx.default_device()}")
          print(f"Is GPU available? {'Yes' if mx.metal.is_available() else 'No'}")
          
          print("\n=== DIAGNOSTIC 2: Recursive Architecture Discovery ===")
          try:
              student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")
              print("-> Model loaded successfully.")
              
              nested_params = student_model.parameters()
              flattened_keys = []

              # Recursive function to dig into MLX's nested parameter tree
              def extract_keys(d, prefix=""):
                  for k, v in d.items():
                      full_key = f"{prefix}.{k}" if prefix else k
                      if isinstance(v, dict):
                          extract_keys(v, full_key)
                      else:
                          flattened_keys.append((full_key, v))

              extract_keys(nested_params)
              print(f"Total raw parameter tensors tracked: {len(flattened_keys)}")
              
              print("\nSample of flattened internal parameter keys (Top 20):")
              for k, v in flattened_keys[:20]:
                  # Catch shape if it's an array, otherwise print the type
                  shape_info = v.shape if hasattr(v, 'shape') else type(v)
                  print(f" - {k} | Info: {shape_info}")
              
              # Searching for the projection head in the flattened keys
              head_matches = [k for k, v in flattened_keys if "head" in k or "lm_head" in k]
              print(f"\nKeys containing 'head' or 'lm_head': {head_matches}")
              
          except Exception as e:
              print(f"FAIL in architecture reading: {str(e)}")

          print("\n=== DIAGNOSTIC 3: Raw GPU Speed Benchmarking ===")
          try:
              # Testing raw Metal speed on the runner for matrix ops
              a = mx.random.normal((4096, 4096))
              b = mx.random.normal((4096, 4096))
              
              start = time.time()
              # Force GPU execution with eval
              c = mx.eval(mx.matmul(a, b))
              end = time.time()
              print(f"4096 x 4096 MatMul on GPU took: {end - start:.4f} seconds")
          except Exception as e:
              print(f"GPU benchmark failed: {str(e)}")

          print("\n=== DIAGNOSTIC 4: Quantization State Check ===")
          try:
              if head_matches:
                  # Find the tensor for the first head match
                  target_key = head_matches[0]
                  target_tensor = next(v for k, v in flattened_keys if k == target_key)
                  
                  print(f"Targeting key: {target_key}")
                  print(f"Dtype of targeted tensor: {target_tensor.dtype if hasattr(target_tensor, 'dtype') else 'N/A'}")
                  
                  # Check if we can run a trace on it
                  def dummy_loss(w):
                      return mx.mean(w)
                  
                  grad_fn = mx.value_and_grad(dummy_loss)
                  val, grads = grad_fn(target_tensor)
                  print("Gradient check on targeted head: SUCCESSFUL")
              else:
                  print("Skipped check because no head keys were discovered.")
          except Exception as e:
              print(f"Gradient check failed: {str(e)}")
          EOF

          "${VENV_DIR}/bin/python" scripts/probe.py
