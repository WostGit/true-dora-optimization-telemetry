name: separation-theorem-exhaustive-preliminaries

on:
  workflow_dispatch:

jobs:
  probe-environment:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Laser Diagnostic
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/laser_probe.py
          import sys
          import mlx.core as mx
          from mlx_lm import load

          print("=== PROBE 1: Loading & Inspecting Model Instance ===")
          try:
              model, tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")
              print(f"Model Python Class: {type(model)}")
              
              # Inspecting Python attributes directly to ignore dictionary mappings
              print(f"Has model.model? {hasattr(model, 'model')}")
              print(f"Has model.lm_head? {hasattr(model, 'lm_head')}")
              print(f"Has model.embed_tokens? {hasattr(model, 'embed_tokens') if not hasattr(model, 'model') else hasattr(model.model, 'embed_tokens')}")
          except Exception as e:
              print(f"Model load/inspect fail: {str(e)}")

          print("\n=== PROBE 2: Gradient Flow via Tie-Weights ===")
          try:
              # We found model.embed_tokens.weight in your log. Let's trace it!
              # Since it's 4-bit, let's see if we can perform floating point math on it.
              w = model.model.embed_tokens.weight if hasattr(model, 'model') else model.embed_tokens.weight
              
              print(f"Found weight shape: {w.shape}")
              
              # We define a pure mathematical function to test for MLX VJP compatibility
              def soft_target_dummy(weights):
                  # Pretend this is our loss function operating on a slice of the head
                  slice_w = weights[:1000, :100]
                  return mx.mean(mx.softmax(slice_w, axis=-1))

              grad_fn = mx.value_and_grad(soft_target_dummy)
              loss_val, grads = grad_fn(w)
              print("-> Soft Target dummy gradient pass: SUCCESSFUL")
              
          except Exception as e:
              print(f"-> Soft Target dummy gradient pass failed: {str(e)}")

          print("\n=== PROBE 3: Direct Forward Pass Extraction ===")
          try:
              # Let's see what the model actually outputs on a forward pass
              prompt_tokens = mx.array([[100, 200, 300]]) # Arbitrary token IDs
              logits = model(prompt_tokens)
              print(f"Logits shape on forward pass: {logits.shape}")
              print(f"Logits dtype: {logits.dtype}")
              print("Forward pass successful.")
          except Exception as e:
              print(f"Forward pass failed: {str(e)}")
          EOF

          "${VENV_DIR}/bin/python" scripts/laser_probe.py
