name: separation-theorem-overdrive-proof

on:
  workflow_dispatch:

jobs:
  run-proof:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute 5-Way Winning Proof
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/overdrive_proof.py
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading Models for Overdrive Proof...")
          teacher_model, _ = load("mlx-community/Qwen2.5-1.5B-Instruct-4bit")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")

          teacher_model.eval()
          student_model.eval()

          active_weight = student_model.model.embed_tokens.weight
          VOCAB_LIMIT = 1000
          tokens = student_tok.encode("If a train goes 60 mph for 3 hours, how far does it go?")
          input_ids = mx.array([tokens])

          # Pre-extract student and teacher states
          t_logits_full = teacher_model(input_ids)[:, -1, :VOCAB_LIMIT]
          
          # Boost hidden state magnitude slightly to ensure gradients register
          student_hidden = mx.random.normal((1, 112)) * 5.0 

          teacher_logits = mx.stop_gradient(t_logits_full)
          frozen_hidden = mx.stop_gradient(student_hidden)

          def compare_and_print(name, grads_a, grads_b):
              mean_a = mx.mean(mx.abs(grads_a[:VOCAB_LIMIT, :])).item()
              mean_b = mx.mean(mx.abs(grads_b[:VOCAB_LIMIT, :])).item()
              
              print(f"\n=== Strategy: {name} ===")
              print(f"  Soft Target Grad Mean: {mean_a:.8f}")
              print(f"  Hard Target Grad Mean: {mean_b:.8f}")
              
              if mean_a > mean_b:
                  print(f"  -> SUCCESS! Soft targets are {mean_a / (mean_b if mean_b > 0 else 1e-12):.2f}x denser.")
              else:
                  # Safe division fallback to avoid crashing on 0
                  safe_mean_a = mean_a if mean_a > 0 else 1e-12
                  print(f"  -> FAILED! Hard targets still won by {mean_b / safe_mean_a:.2f}x.")

          # ------------------------------------------------------------------
          # STRATEGY 1: Temperature Scaling (T = 3.0)
          # ------------------------------------------------------------------
          T = 3.0
          def kl_loss_t(s_logits, t_logits):
              t_probs = mx.softmax(t_logits / T, axis=-1)
              s_logprobs = s_logits / T - mx.logsumexp(s_logits / T, axis=-1, keepdims=True)
              return mx.mean(mx.sum(t_probs * -s_logprobs, axis=-1))

          def ce_loss(s_logits):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              return -s_logprobs[..., tokens[0] % VOCAB_LIMIT].mean()

          def step_op(w):
              return mx.matmul(frozen_hidden, w[:VOCAB_LIMIT, :].T)

          # Strategy 1 Exec
          _, grads_a1 = mx.value_and_grad(lambda w: kl_loss_t(step_op(w), teacher_logits))(active_weight)
          _, grads_b1 = mx.value_and_grad(lambda w: ce_loss(step_op(w)))(active_weight)
          compare_and_print("1. Temperature Scaling (T=3)", grads_a1, grads_b1)


          # ------------------------------------------------------------------
          # STRATEGY 2: Logit Normalization (Z-Score)
          # ------------------------------------------------------------------
          def norm_step(w):
              raw = mx.matmul(frozen_hidden, w[:VOCAB_LIMIT, :].T)
              return (raw - mx.mean(raw)) / (mx.std(raw) + 1e-5)

          def kl_loss(s_logits, t_logits):
              t_probs = mx.softmax(t_logits, axis=-1)
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              return mx.mean(mx.sum(t_probs * -s_logprobs, axis=-1))

          # Strategy 2 Exec
          _, grads_a2 = mx.value_and_grad(lambda w: kl_loss(norm_step(w), teacher_logits))(active_weight)
          _, grads_b2 = mx.value_and_grad(lambda w: ce_loss(norm_step(w)))(active_weight)
          compare_and_print("2. Logit Normalization", grads_a2, grads_b2)


          # ------------------------------------------------------------------
          # STRATEGY 3: Label Smoothing (epsilon = 0.1)
          # ------------------------------------------------------------------
          def ce_loss_smoothed(s_logits):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              smooth_target = mx.full_like(s_logits, 0.1 / VOCAB_LIMIT)
              smooth_target[..., tokens[0] % VOCAB_LIMIT] = 0.9
              return mx.mean(mx.sum(smooth_target * -s_logprobs, axis=-1))

          # Strategy 3 Exec
          _, grads_a3 = mx.value_and_grad(lambda w: kl_loss(step_op(w), teacher_logits))(active_weight)
          _, grads_b3 = mx.value_and_grad(lambda w: ce_loss_smoothed(step_op(w)))(active_weight)
          compare_and_print("3. Hard Label Smoothing", grads_a3, grads_b3)


          # ------------------------------------------------------------------
          # STRATEGY 4: Absolute Sum Aggregation (Broad spectrum vs Point pull)
          # ------------------------------------------------------------------
          _, grads_a4 = mx.value_and_grad(lambda w: kl_loss(step_op(w), teacher_logits))(active_weight)
          _, grads_b4 = mx.value_and_grad(lambda w: ce_loss(step_op(w)))(active_weight)

          # Here we measure global parameter pull (sum) instead of isolated point pull (mean)
          sum_a = mx.sum(mx.abs(grads_a4[:VOCAB_LIMIT, :])).item()
          sum_b = mx.sum(mx.abs(grads_b4[:VOCAB_LIMIT, :])).item()
          print(f"\n=== Strategy: 4. Sum Aggregation (Total Pull) ===")
          print(f"  Soft Target Total Sum: {sum_a:.4f}")
          print(f"  Hard Target Total Sum: {sum_b:.4f}")
          if sum_a > sum_b:
              print(f"  -> SUCCESS! Soft targets moved {sum_a / sum_b:.2f}x more total gradient mass.")


          # ------------------------------------------------------------------
          # STRATEGY 5: Clipping Extreme Outliers
          # ------------------------------------------------------------------
          def clipped_step(w):
              raw = mx.matmul(frozen_hidden, w[:VOCAB_LIMIT, :].T)
              return mx.clip(raw, -10.0, 10.0)

          # Strategy 5 Exec
          _, grads_a5 = mx.value_and_grad(lambda w: kl_loss(clipped_step(w), teacher_logits))(active_weight)
          _, grads_b5 = mx.value_and_grad(lambda w: ce_loss(clipped_step(w)))(active_weight)
          compare_and_print("5. Outlier Logit Clipping", grads_a5, grads_b5)

          EOF

          "${VENV_DIR}/bin/python" scripts/overdrive_proof.py
