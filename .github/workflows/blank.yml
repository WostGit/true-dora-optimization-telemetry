name: separation-theorem-16bit-unquantized-proof

on:
  workflow_dispatch:

jobs:
  run-proof:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute 16-bit True Proof
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/true_proof.py
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading 16-bit Float Models...")
          # Loading the unquantized brain architectures
          teacher_model, _ = load("mlx-community/Qwen2.5-1.5B-Instruct-bf16")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-bf16")

          teacher_model.eval()
          # We keep the student in training mode so the tape can track gradients
          student_model.train() 

          VOCAB_LIMIT = 2000
          tokens = student_tok.encode("The quick brown fox jumps over")
          input_ids = mx.array([tokens])

          # 1. Forward pass for frozen teacher logits
          t_logits = teacher_model(input_ids)[:, -1, :VOCAB_LIMIT]
          teacher_logits = mx.stop_gradient(t_logits)

          def compare_and_print(name, grads_a, grads_b):
              # We map the gradient across the active params
              mean_a = mx.mean(mx.abs(grads_a)).item()
              mean_b = mx.mean(mx.abs(grads_b)).item()
              
              print(f"\n=== Strategy: {name} ===")
              print(f"  Soft Target Grad Mean: {mean_a:.8f}")
              print(f"  Hard Target Grad Mean: {mean_b:.8f}")
              
              if mean_a > mean_b:
                  print(f"  -> SUCCESS! Soft targets are {mean_a / (mean_b if mean_b > 0 else 1e-10):.2f}x denser.")
              else:
                  print(f"  -> Hard targets won by {mean_b / (mean_a if mean_a > 0 else 1e-10):.2f}x.")

          # Setup base functions
          def get_student_logits():
              # A real forward pass through unquantized floating-point gates!
              return student_model(input_ids)[:, -1, :VOCAB_LIMIT]

          def kl_loss(s_logits, t_logits, T=1.0):
              t_probs = mx.softmax(t_logits / T, axis=-1)
              s_logprobs = s_logits / T - mx.logsumexp(s_logits / T, axis=-1, keepdims=True)
              return mx.mean(mx.sum(t_probs * -s_logprobs, axis=-1))

          def ce_loss(s_logits, smooth=0.0):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              if smooth == 0.0:
                  return -s_logprobs[..., tokens[0] % VOCAB_LIMIT].mean()
              else:
                  smooth_target = mx.ones_like(s_logits) * (smooth / VOCAB_LIMIT)
                  smooth_target[..., tokens[0] % VOCAB_LIMIT] = 1.0 - smooth
                  return mx.mean(mx.sum(smooth_target * -s_logprobs, axis=-1))

          # Extract model parameters for backprop
          params = student_model.parameters()

          # --- RUNNING ALL OPTIONS NATIVELY ---

          # Option 1: Standard Play (T=1)
          def opt1_a(): return kl_loss(get_student_logits(), teacher_logits)
          def opt1_b(): return ce_loss(get_student_logits())
          grads_a1 = mx.grad(opt1_a)(params)
          grads_b1 = mx.grad(opt1_b)(params)
          compare_and_print("1. Standard Baseline (T=1.0)", grads_a1, grads_b1)

          # Option 2: High Temperature (T=2.0)
          def opt2_a(): return kl_loss(get_student_logits(), teacher_logits, T=2.0)
          grads_a2 = mx.grad(opt2_a)(params)
          compare_and_print("2. High Temperature (T=2.0)", grads_a2, grads_b1)

          # Option 3: Low Temperature (T=0.5)
          def opt3_a(): return kl_loss(get_student_logits(), teacher_logits, T=0.5)
          grads_a3 = mx.grad(opt3_a)(params)
          compare_and_print("3. Low Temperature (T=0.5)", grads_a3, grads_b1)

          # Option 4: Label Smoothing (epsilon = 0.1)
          def opt4_b(): return ce_loss(get_student_logits(), smooth=0.1)
          grads_b4 = mx.grad(opt4_b)(params)
          compare_and_print("4. Hard Label Smoothing", grads_a1, grads_b4)

          # Option 5: Sum Aggregation Total Mass
          sum_a = mx.sum(mx.abs(grads_a1)).item()
          sum_b = mx.sum(mx.abs(grads_b1)).item()
          print(f"\n=== Option 5: Sum Aggregation (Total Pull) ===")
          print(f"  Soft Target Total Sum: {sum_a:.4f}")
          print(f"  Hard Target Total Sum: {sum_b:.4f}")
          if sum_a > sum_b:
              print(f"  -> SUCCESS! Soft targets moved {sum_a / sum_b:.2f}x more total gradient mass.")
          else:
              print(f"  -> FAILED! Hard targets still won by {sum_b / sum_a:.2f}x.")

          EOF

          "${VENV_DIR}/bin/python" scripts/true_proof.py
