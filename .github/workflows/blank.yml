name: separation-theorem-faithful-proof

on:
  workflow_dispatch:

jobs:
  distillation-benchmark:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        strategy_name: [lm_head_kl, lm_head_ce, frozen_random_kl, attention_proxy_kl, vocab_slice_kl]

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Parallel Distillation
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/parallel_test.py
          import os
          import sys
          import mlx.core as mx
          from mlx_lm import load

          strategy = os.environ.get("STRATEGY_NAME", "lm_head_kl")
          print(f"[INIT] Starting Strategy: {strategy}")

          teacher_model, teacher_tok = load("mlx-community/Qwen2.5-1.5B-Instruct-4bit")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")

          teacher_model.eval()
          student_model.eval()

          VOCAB_LIMIT = 2000
          LEARNING_RATE = 1e-4
          prompt = "If a train goes 60 mph for 3 hours, how far does it go?"

          def kl_loss(s_logits, t_logits):
              t_logprobs = t_logits - mx.logsumexp(t_logits, axis=-1, keepdims=True)
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              t_probs = mx.softmax(t_logits, axis=-1)
              return mx.mean(mx.sum(t_probs * (t_logprobs - s_logprobs), axis=-1))

          def ce_loss(s_logits, tokens):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              mask = mx.zeros_like(s_logits)
              mask[..., tokens[0] % VOCAB_LIMIT] = 1.0
              return -mx.sum(mask * s_logprobs)

          def run_test():
              # FIX: Pulling weight directly without searching dictionary keys
              base_head_weight = student_model.lm_head.weight
              target_key = "lm_head.weight"
              
              tokens = teacher_tok.encode(prompt)
              input_ids = mx.array([tokens])

              # 1: LM Head + Soft Targets (KL)
              if strategy == "lm_head_kl":
                  trainable = {target_key: base_head_weight}
                  def step(p):
                      student_model.lm_head.weight = p[target_key]
                      return kl_loss(student_model(input_ids)[:, -1, :VOCAB_LIMIT], teacher_model(input_ids)[:, -1, :VOCAB_LIMIT])

              # 2: LM Head + Hard Targets (CE)
              elif strategy == "lm_head_ce":
                  trainable = {target_key: base_head_weight}
                  def step(p):
                      student_model.lm_head.weight = p[target_key]
                      return ce_loss(student_model(input_ids)[:, -1, :VOCAB_LIMIT], tokens)

              # 3: Frozen Random Initialized Distillation
              elif strategy == "frozen_random_kl":
                  random_weight = mx.random.normal(base_head_weight.shape)
                  trainable = {target_key: random_weight}
                  def step(p):
                      student_model.lm_head.weight = p[target_key]
                      return kl_loss(student_model(input_ids)[:, -1, :VOCAB_LIMIT], teacher_model(input_ids)[:, -1, :VOCAB_LIMIT])

              # 4: Low Rank Attention Proxy
              elif strategy == "attention_proxy_kl":
                  adapter = mx.random.normal((VOCAB_LIMIT, 100))
                  trainable = {"proxy": adapter}
                  def step(p):
                      raw_logits = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
                      mod_logits = raw_logits + mx.mean(p["proxy"])
                      return kl_loss(mod_logits, teacher_model(input_ids)[:, -1, :VOCAB_LIMIT])

              # 5: Extreme Vocab Slice
              elif strategy == "vocab_slice_kl":
                  trainable = {target_key: base_head_weight}
                  def step(p):
                      student_model.lm_head.weight = p[target_key]
                      return kl_loss(student_model(input_ids)[:, -1, :500], teacher_model(input_ids)[:, -1, :500])

              grad_fn = mx.value_and_grad(step)
              loss_val, grads = grad_fn(trainable)
              
              print(f"\n[METRIC] Strategy {strategy} Initial Loss: {loss_val.item():.6f}")
              
              for k in grads:
                  print(f"[TRACE] Gradients extracted for {k}. Mean gradient delta: {mx.mean(grads[k]).item():.6f}")
                  
          if __name__ == "__main__":
              run_test()
          EOF

          STRATEGY_NAME="${{ matrix.strategy_name }}" "${VENV_DIR}/bin/python" scripts/parallel_test.py
