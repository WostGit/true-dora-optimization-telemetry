name: separation-theorem-16bit-unquantized-proof

on:
  workflow_dispatch:

jobs:
  run-proof:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Verbose Proof
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/verbose_proof.py
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading 16-bit Float Models...")
          teacher_model, _ = load("mlx-community/Qwen2.5-1.5B-Instruct-bf16")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-bf16")

          teacher_model.eval()
          student_model.train() 

          VOCAB_LIMIT = 500  # Narrowed limit to make verbose printing readable
          tokens = student_tok.encode("The quick brown fox jumps over")
          input_ids = mx.array([tokens])

          # Target label extraction
          target_id = tokens[0] % VOCAB_LIMIT

          print("\n=== INPUT VERBOSE METRICS ===")
          print(f"Prompt Tokens: {tokens}")
          print(f"Hard Target Token ID mapped to vocab slice: {target_id}")

          # 1. Forward pass for frozen teacher logits
          t_logits = teacher_model(input_ids)[:, -1, :VOCAB_LIMIT]
          teacher_logits = mx.stop_gradient(t_logits)

          print("\n=== TEACHER LOGITS DISTRIBUTION ===")
          print(f"Teacher Logits Shape: {teacher_logits.shape}")
          print(f"Teacher Logits Max: {mx.max(teacher_logits).item():.4f}")
          print(f"Teacher Logits Min: {mx.min(teacher_logits).item():.4f}")
          print(f"Teacher Logits Mean: {mx.mean(teacher_logits).item():.4f}")
          
          t_probs = mx.softmax(teacher_logits, axis=-1)
          print(f"Teacher Probabilities (Top 5): {mx.sort(t_probs)[..., -5:].tolist()}")

          def extract_verbose_grad(grads, name="Gradients"):
              total_abs_sum = 0.0
              total_count = 0
              flat_samples = []
              
              def traverse(g):
                  nonlocal total_abs_sum, total_count, flat_samples
                  if isinstance(g, dict):
                      for k, v in g.items():
                          traverse(v)
                  elif isinstance(g, mx.array):
                      total_abs_sum += mx.sum(mx.abs(g)).item()
                      total_count += g.size
                      if len(flat_samples) < 5:
                          flat_samples.extend(g.flatten()[:5].tolist())
              
              traverse(grads)
              mean_val = total_abs_sum / total_count if total_count > 0 else 0.0
              
              print(f"\n[{name}]")
              print(f"  Mean Abs Value: {mean_val:.8f}")
              print(f"  Sample values (first 5 found): {[f'{x:.8f}' for x in flat_samples[:5]]}")
              return mean_val

          def kl_loss(s_logits, t_logits):
              t_probs = mx.softmax(t_logits, axis=-1)
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              return mx.mean(mx.sum(t_probs * -s_logprobs, axis=-1))

          def ce_loss(s_logits):
              s_logprobs = s_logits - mx.logsumexp(s_logits, axis=-1, keepdims=True)
              return -s_logprobs[..., target_id].mean()

          params = student_model.parameters()

          # --- RUN AND INSPECT ---

          # A. RUNNING HARD TARGET TRACE
          student_model.update(params)
          s_logits_hard = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
          
          print("\n=== STUDENT LOGITS BEFORE LOSS ===")
          print(f"Student Logits Max: {mx.max(s_logits_hard).item():.4f}")
          print(f"Student Logits Min: {mx.min(s_logits_hard).item():.4f}")

          def opt_hard(p):
              student_model.update(p)
              return ce_loss(student_model(input_ids)[:, -1, :VOCAB_LIMIT])

          grads_hard = mx.grad(opt_hard)(params)
          extract_verbose_grad(grads_hard, name="HARD TARGET GRADIENTS")

          # B. RUNNING SOFT TARGET TRACE
          def opt_soft(p):
              student_model.update(p)
              return kl_loss(student_model(input_ids)[:, -1, :VOCAB_LIMIT], teacher_logits)

          grads_soft = mx.grad(opt_soft)(params)
          extract_verbose_grad(grads_soft, name="SOFT TARGET GRADIENTS")

          EOF

          "${VENV_DIR}/bin/python" scripts/verbose_proof.py
