name: separation-theorem-preliminaries-probe

on:
  workflow_dispatch:

jobs:
  probe-environment:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Extensive Diagnostics
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/probe.py
          import sys
          import mlx.core as mx
          from mlx_lm import load

          print("=== DIAGNOSTIC 1: MLX Environment ===")
          print(f"Python version: {sys.version}")
          print(f"MLX default device: {mx.default_device()}")
          print(f"Is GPU available? {'Yes' if mx.metal.is_available() else 'No'}")
          
          print("\n=== DIAGNOSTIC 2: Model Architecture Discovery ===")
          try:
              # Loading student model to inspect its exact dictionary keys
              student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")
              print("-> Model loaded successfully.")
              
              # Pull all parameter dictionary keys
              params = student_model.parameters()
              print(f"Total parameter tensors found: {len(params)}")
              
              print("\nSample of internal parameter keys:")
              keys = list(params.keys())
              for k in keys[:15]:
                  print(f" - {k} | Shape: {params[k].shape}")
              
              # Searching for projection head natively
              lm_head_keys = [k for k in keys if "lm_head" in k]
              head_keys = [k for k in keys if "head" in k]
              print(f"\nKeys containing 'lm_head': {lm_head_keys}")
              print(f"Keys containing 'head': {head_keys}")
              
          except Exception as e:
              print(f"CRITICAL FAIL in architecture reading: {str(e)}")

          print("\n=== DIAGNOSTIC 3: Gradient VJP Feasibility ===")
          try:
              # Testing if small scalar VJP math throws the QuantizedMatmul error
              def dummy_loss(w):
                  return mx.mean(w * 2.0)
                  
              grad_fn = mx.value_and_grad(dummy_loss)
              test_tensor = mx.array([1.0, 2.0, 3.0])
              val, grad = grad_fn(test_tensor)
              print("Standard Float Gradient compute: SUCCESSFUL")
              
              # Attempt to pass gradient through loaded head
              if lm_head_keys:
                  def weight_loss(w_dict):
                      return mx.mean(w_dict[lm_head_keys[0]])
                  
                  weight_grad_fn = mx.value_and_grad(weight_loss)
                  val, grad = weight_grad_fn({lm_head_keys[0]: params[lm_head_keys[0]]})
                  print("Model Weight Gradient compute: SUCCESSFUL")
              else:
                  print("Skipped weight gradient test (no keys found).")
                  
          except Exception as e:
              print(f"VJP Compute failed: {str(e)}")
          EOF

          "${VENV_DIR}/bin/python" scripts/probe.py
