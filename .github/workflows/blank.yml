name: separation-theorem-exhaustive-preliminaries

on:
  workflow_dispatch:

jobs:
  run-diagnostics:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Exhaustive Gradient Probes
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/deep_probe.py
          import sys
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading Student Model...")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")
          student_model.eval()

          target_weight = student_model.model.embed_tokens.weight
          prompt_tokens = mx.array([[100, 200, 300]])

          # ------------------------------------------------------------
          # TEST 1: ISOLATED WEIGHT DERIVATIVE
          # ------------------------------------------------------------
          print("\n=== TEST 1: Isolated Weight Gradient ===")
          try:
              def isolate_loss(w):
                  return mx.mean(w[:100, :10] * 2.0)
              
              grad_fn = mx.value_and_grad(isolate_loss)
              val, grad = grad_fn(target_weight)
              print("SUCCESS: We can directly differentiate the weight matrix alone.")
          except Exception as e:
              print(f"FAILED: {str(e)}")

          # ------------------------------------------------------------
          # TEST 2: FROZEN FORWARD PASS
          # ------------------------------------------------------------
          print("\n=== TEST 2: Full Forward Pass (Are base weights locked?) ===")
          try:
              def forward_loss(w):
                  student_model.model.embed_tokens.weight = w
                  logits = student_model(prompt_tokens)
                  return mx.mean(logits)
              
              grad_fn = mx.value_and_grad(forward_loss)
              val, grad = grad_fn(target_weight)
              print("SUCCESS: Full forward pass does not trigger a VJP block.")
          except Exception as e:
              print(f"FAILED: This confirms forward passes hit a quantized lock. Details: {str(e)}")

          # ------------------------------------------------------------
          # TEST 3: DETACHED LOGITS DERIVATIVE
          # ------------------------------------------------------------
          print("\n=== TEST 3: Detached Head Extraction ===")
          try:
              # Run forward pass first, outside the gradient tape
              with mx.no_grad():
                  base_logits = student_model(prompt_tokens)
              
              def detached_loss(w):
                  # Apply weight adjustments to already calculated logits
                  adjusted_logits = base_logits + mx.mean(w[:1, :1])
                  return mx.mean(adjusted_logits)
                  
              grad_fn = mx.value_and_grad(detached_loss)
              val, grad = grad_fn(target_weight)
              print("SUCCESS: Detaching calculations from 4-bit base layers bypasses the lock.")
          except Exception as e:
              print(f"FAILED: {str(e)}")

          # ------------------------------------------------------------
          # TEST 4: WHICH EXACT LAYER CAUSES THE LOCK?
          # ------------------------------------------------------------
          print("\n=== TEST 4: Finding the culprit layer ===")
          try:
              params = student_model.parameters()
              # We try to calculate gradients for every parameter to see which ones fail
              for key, value in params.items():
                  if "weight" in key and hasattr(value, 'shape'):
                      try:
                          def layer_loss(v):
                              return mx.mean(v)
                          g_fn = mx.value_and_grad(layer_loss)
                          g_fn(value)
                      except Exception as e:
                          print(f"Culprit found -> Layer '{key}' cannot compute gradients. Error: {str(e)}")
              print("Scan complete.")
          except Exception as e:
              print(f"Failed to scan: {str(e)}")

          EOF

          "${VENV_DIR}/bin/python" scripts/deep_probe.py
