name: separation-theorem-faithful-proof

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Fast Comparative Distillation
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/faithful_comparison.py
          import os
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading Pure Unquantized Float Models...")
          teacher_model, teacher_tok = load("Qwen/Qwen2.5-1.5B-Instruct")
          student_model, student_tok = load("Qwen/Qwen2.5-0.5B-Instruct")

          teacher_model.eval()
          student_model.eval()

          # Hard vocabulary ceiling to compress the compute space
          VOCAB_LIMIT = 1000
          LEARNING_RATE = 1e-4

          prompt = "Question: 2 + 2 = ? Answer: 4"

          # ------------------------------------------------------------
          # LOSS FUNCTIONS
          # ------------------------------------------------------------
          def kl_loss(student_logits, teacher_logits):
              t_logprobs = teacher_logits - mx.logsumexp(teacher_logits, axis=-1, keepdims=True)
              s_logprobs = student_logits - mx.logsumexp(student_logits, axis=-1, keepdims=True)
              t_probs = mx.softmax(teacher_logits, axis=-1)
              divergence = mx.sum(t_probs * (t_logprobs - s_logprobs), axis=-1)
              return mx.mean(divergence)

          def ce_loss(student_logits, target_token_ids):
              s_logprobs = student_logits - mx.logsumexp(student_logits, axis=-1, keepdims=True)
              target_mask = mx.zeros_like(student_logits)
              target_mask[..., target_token_ids[0] % VOCAB_LIMIT] = 1.0
              return -mx.sum(target_mask * s_logprobs)

          # ------------------------------------------------------------
          # FAST OPTIMIZATION LOOP
          # ------------------------------------------------------------
          def run_experiment():
              # Grab the raw tensor dictionary for the unquantized projection head 
              # This circumvents PyTorch-wrapper missing attribute bugs entirely
              target_key = "lm_head.weight"
              all_params = student_model.parameters()
              
              if target_key not in all_params:
                  # Fallback search if the keys are mapped differently in this release
                  target_key = [k for k in all_params.keys() if "lm_head" in k][0]
              
              # Isolate just the output head weights for fast training
              trainable_params = {target_key: all_params[target_key]}
              baseline_weight = all_params[target_key]
              
              tokens = teacher_tok.encode(prompt)
              input_ids = mx.array([tokens])
              
              # --- APPROACH A: SOFT TARGETS (KL DIVERGENCE) ---
              def kl_step(params):
                  student_model.update(params)
                  s_logits = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  t_logits = teacher_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  return kl_loss(s_logits, t_logits)

              kl_grad_fn = mx.value_and_grad(kl_step)
              
              print("\n[RUN] Beginning Approach A (Soft Targets - KL Divergence)")
              loss_value, grads = kl_grad_fn(trainable_params)
              
              # Quick manual parameter update
              updated_params = {k: trainable_params[k] - LEARNING_RATE * grads[k] for k in grads}
              mx.eval(updated_params)
              
              print(f" -> Baseline KL Loss: {loss_value.item():.6f}")

              # Reset parameters back to clean baseline state
              print("\n[RESET] Restoring Baseline Student Weights...")
              student_model.update({target_key: baseline_weight})
              
              # --- APPROACH B: HARD TARGETS (CROSS-ENTROPY) ---
              def ce_step(params):
                  student_model.update(params)
                  s_logits = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  return ce_loss(s_logits, tokens)

              ce_grad_fn = mx.value_and_grad(ce_step)
              
              print("\n[RUN] Beginning Approach B (Hard Targets - Cross-Entropy)")
              loss_value, grads = ce_grad_fn(trainable_params)
              
              updated_params = {k: trainable_params[k] - LEARNING_RATE * grads[k] for k in grads}
              mx.eval(updated_params)
              
              print(f" -> Baseline CE Loss: {loss_value.item():.6f}")

          if __name__ == "__main__":
              run_experiment()
          EOF

          "${VENV_DIR}/bin/python" scripts/faithful_comparison.py
