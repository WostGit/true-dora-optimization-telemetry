name: active-dora-gradient-descent

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-4bit
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Real DoRA Learning
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/dora_real_learning.py
          import os
          import time
          import numpy as np
          import mlx.core as mx
          from mlx_lm import load

          prompts = [
              "Question: If a train travels at 60 mph for 3 hours, how far does it go? Answer: 180 miles.",
              "Question: Solve for x: 2x + 5 = 15. Answer: x = 5.",
              "Question: What is the capital of France? Answer: Paris.",
              "Question: Convert 100 Celsius to Fahrenheit. Answer: 212 Fahrenheit."
          ]

          print("\n[INIT] ========================================================")
          print("[INIT] ORACLE INITIALIZATION & REAL DORA AUTO-GRAD")
          print("[INIT] ========================================================")

          teacher_repo = os.environ["TEACHER_MODEL"]
          student_repo = os.environ["STUDENT_MODEL"]

          load_start = time.time()
          teacher_model, teacher_tok = load(teacher_repo)
          student_model, student_tok = load(student_repo)

          teacher_model.eval()
          student_model.eval()

          print(f"[INIT] Models loaded in {time.time() - load_start:.2f}s")

          rank = 8
          out_dim = 1000  
          in_dim = 896

          # FIX: Scale random noise down by 0.01 so DoRA doesn't overwhelm the base logits
          np.random.seed(42)
          params = {
              "m": mx.array(np.random.randn(out_dim, 1) * 0.01),
              "A": mx.array(np.random.randn(out_dim, rank) * 0.01),
              "B": mx.array(np.random.randn(rank, in_dim) * 0.01)
          }

          lr = 0.05  

          def loss_fn(p, teacher_probs, student_base_logits):
              V = mx.matmul(p["A"], p["B"])
              V_norm = mx.linalg.norm(V, axis=-1, keepdims=True) + 1e-6
              dora_matrix = p["m"] * (V / V_norm)
              
              adapted_logits = student_base_logits + mx.mean(dora_matrix, axis=-1)
              
              # Log-sum-exp trick for numerical stability
              s_logsumexp = mx.logsumexp(adapted_logits, axis=-1, keepdims=True)
              s_logprobs = adapted_logits - s_logsumexp
              
              # FIX: Add a safeguard epsilon to the log calculation to prevent NaN
              return mx.sum(teacher_probs * (mx.log(teacher_probs + 1e-9) - (s_logprobs - 1e-9)))

          grad_fn = mx.value_and_grad(loss_fn)

          print(f"[INIT] Target Adapter Subspace: Out_Dim={out_dim}, In_Dim={in_dim}, Rank={rank}")
          print(f"[INIT] Attack compiled. Initial ||m||: {mx.linalg.norm(params['m']).item():.3f}")

          print("\n[ATTACK] ------------------------------------------------------")
          print("[ATTACK] BEGINNING ATTACK: REAL DORA OPTIMIZATION")
          print("[ATTACK] ------------------------------------------------------")

          for epoch in range(1, 4):
              print(f"\n[EPOCH {epoch:02d}] Processing static probe batch...")
              epoch_kl = 0.0
              
              for i, prompt in enumerate(prompts):
                  tokens = teacher_tok.encode(prompt)
                  input_ids = mx.array([tokens])
                  
                  t_logits = teacher_model(input_ids)[:, -1, :out_dim]
                  s_base_logits = student_model(input_ids)[:, -1, :out_dim]
                  t_probs = mx.softmax(t_logits, axis=-1)
                  
                  loss_value, grads = grad_fn(params, t_probs, s_base_logits)
                  epoch_kl += loss_value.item()
                  
                  params["m"] = params["m"] - lr * grads["m"]
                  params["A"] = params["A"] - lr * grads["A"]
                  params["B"] = params["B"] - lr * grads["B"]
                  
                  grad_m_norm = mx.linalg.norm(grads["m"]).item()
                  print(f"  [PROBE {i+1:02d}] Current D_KL: {loss_value.item():.6f} | Norm of Grad_m: {grad_m_norm:.6f}")

              print(f"[EPOCH {epoch:02d}] Complete. Total Batch KL: {epoch_kl:.6f}")
              print(f"[EPOCH {epoch:02d}] Updated ||m||: {mx.linalg.norm(params['m']).item():.4f}")

          print("\n[PROOF] ############################################################")
          print("[PROOF] REAL DORA EXTRACTION COMPLETE")
          print("[PROOF] ############################################################\n")
          EOF

          "${VENV_DIR}/bin/python" scripts/dora_real_learning.py
