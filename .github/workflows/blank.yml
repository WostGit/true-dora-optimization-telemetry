name: adversarial-blackbox-distillation-proof

on:
  workflow_dispatch:

jobs:
  run-proof:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Distillation Attack Simulation
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/attack_proof.py
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading Models for Adversarial Distillation...")
          teacher_model, teacher_tok = load("mlx-community/Qwen2.5-1.5B-Instruct-bf16")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-bf16")

          teacher_model.eval()
          student_model.train()

          # 1. Simulate the "Attack Prompts" documented by Anthropic
          # They targeted: Agentic reasoning, Chain-of-Thought (CoT), and formatting.
          attack_queries = [
              "Solve this logic puzzle and explain your reasoning step-by-step: If all flubs are glubs, and some glubs are blubs, are all flubs blubs?",
              "Generate a detailed grading rubric for evaluating a Python coding agent.",
              "Rewrite the following statement to remove any potential political bias or censorship flags."
          ]

          print("\n=== STEP 1: EXTRUDING TEACHER KNOWLEDGE (The Attack) ===")
          distillation_dataset = []

          for query in attack_queries:
              # We use a standard generation loop to get the raw text (the only thing attackers have access to)
              prompt_tokens = mx.array([teacher_tok.encode(query)])
              
              # Simple greedy generation to simulate API output
              output_tokens = []
              current_input = prompt_tokens
              
              for _ in range(50):  # Generate 50 tokens of CoT or text
                  logits = teacher_model(current_input)[:, -1, :]
                  next_token = mx.argmax(logits, axis=-1)
                  output_tokens.append(next_token.item())
                  current_input = mx.concatenate([current_input, next_token[None, :]], axis=1)
                  
              decoded_response = teacher_tok.decode(output_tokens)
              print(f"\n[Query]: {query}")
              print(f"[Claude-Equivalent Response]: {decoded_response[:100]}...")
              
              distillation_dataset.append((query, decoded_response))

          # 2. Simulate training the student on extracted text (The mimicry)
          print("\n=== STEP 2: MEASURING STUDENT GRADIENT PULL ===")

          def attack_loss(p):
              student_model.update(p)
              total_loss = 0.0
              
              # Attackers simply train the student to predict the teacher's exact text
              for query, response in distillation_dataset:
                  full_text = query + response
                  tokens = mx.array([student_tok.encode(full_text)])
                  
                  # Standard causal language modeling loss (predict the next token)
                  logits = student_model(tokens)[:, :-1, :]
                  targets = tokens[:, 1:]
                  
                  # Flatten for cross-entropy
                  logits = mx.reshape(logits, (-1, logits.shape[-1]))
                  targets = mx.reshape(targets, (-1,))
                  
                  # Compute standard CE loss
                  logprobs = logits - mx.logsumexp(logits, axis=-1, keepdims=True)
                  selected_logprobs = mx.take_along_axis(logprobs, targets[:, None], axis=-1)
                  total_loss += -mx.mean(selected_logprobs)
                  
              return total_loss / len(distillation_dataset)

          # Calculate the raw gradients of the attack!
          params = student_model.parameters()
          grads = mx.grad(attack_loss)(params)

          # Measure the density
          def extract_mean_grad(g_dict):
              total_abs_sum = 0.0
              total_count = 0
              def traverse(g):
                  nonlocal total_abs_sum, total_count
                  if isinstance(g, dict):
                      for k, v in g.items(): traverse(v)
                  elif isinstance(g, mx.array):
                      total_abs_sum += mx.sum(mx.abs(g)).item()
                      total_count += g.size
              traverse(g_dict)
              return total_abs_sum / total_count if total_count > 0 else 0.0

          attack_gradient_density = extract_mean_grad(grads)
          print(f"\n=== ATTACK COMPLETE ===")
          print(f"Mean Adversarial Gradient Density: {attack_gradient_density:.8f}")

          EOF

          "${VENV_DIR}/bin/python" scripts/attack_proof.py
