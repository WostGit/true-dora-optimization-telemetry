name: separation-theorem-faithful-proof

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Faithful Comparative Distillation
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/faithful_comparison.py
          import os
          import copy
          import mlx.core as mx
          from mlx_lm import load

          print("[INIT] Loading Active Weight Tensors...")
          # Loading actual Qwen models
          teacher_model, teacher_tok = load("mlx-community/Qwen2.5-1.5B-Instruct-4bit")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-4bit")

          teacher_model.eval()
          student_model.eval()

          VOCAB_LIMIT = 2000
          LEARNING_RATE = 1e-5

          prompts = [
              "Question: If a train travels at 60 mph for 3 hours, how far does it go? Answer: 180 miles.",
              "Question: Solve for x: 2x + 5 = 15. Answer: x = 5."
          ]

          # ------------------------------------------------------------
          # LOSS FUNCTIONS
          # ------------------------------------------------------------
          def kl_loss(student_logits, teacher_logits):
              t_logprobs = teacher_logits - mx.logsumexp(teacher_logits, axis=-1, keepdims=True)
              s_logprobs = student_logits - mx.logsumexp(student_logits, axis=-1, keepdims=True)
              t_probs = mx.softmax(teacher_logits, axis=-1)
              divergence = mx.sum(t_probs * (t_logprobs - s_logprobs), axis=-1)
              return mx.mean(divergence)

          def ce_loss(student_logits, target_token_ids):
              s_logprobs = student_logits - mx.logsumexp(student_logits, axis=-1, keepdims=True)
              target_mask = mx.zeros_like(student_logits)
              target_mask[..., target_token_ids[0] % VOCAB_LIMIT] = 1.0
              return -mx.sum(target_mask * s_logprobs)

          # ------------------------------------------------------------
          # OPTIMIZATION LOOP
          # ------------------------------------------------------------
          def run_experiment():
              # FIX: Capture baseline parameters at the start
              baseline_params = copy.deepcopy(student_model.parameters())
              trainable_params = student_model.parameters()
              
              # --- APPROACH A: SOFT TARGETS (KL DIVERGENCE) ---
              def kl_step(params, input_ids):
                  student_model.update(params)
                  s_logits = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  t_logits = teacher_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  return kl_loss(s_logits, t_logits)

              kl_grad_fn = mx.value_and_grad(kl_step)
              
              print("\n[RUN] Beginning Approach A (Soft Targets - KL Divergence)")
              for epoch in range(1, 3):
                  total_loss = 0.0
                  for prompt in prompts:
                      tokens = teacher_tok.encode(prompt)
                      input_ids = mx.array([tokens])
                      
                      loss_value, grads = kl_grad_fn(trainable_params, input_ids)
                      
                      # Active backprop mapping
                      for k in grads.keys():
                          trainable_params[k] = trainable_params[k] - LEARNING_RATE * grads[k]
                          
                      mx.eval(trainable_params)
                      total_loss += loss_value.item()
                  print(f" [EPOCH {epoch:02d}] Total KL Loss: {total_loss:.6f}")

              # Reset parameters back to the clean baseline state
              print("\n[RESET] Restoring Baseline Student Weights...")
              student_model.update(baseline_params)
              trainable_params = student_model.parameters()

              # --- APPROACH B: HARD TARGETS (CROSS-ENTROPY) ---
              def ce_step(params, input_ids, tokens):
                  student_model.update(params)
                  s_logits = student_model(input_ids)[:, -1, :VOCAB_LIMIT]
                  return ce_loss(s_logits, tokens)

              ce_grad_fn = mx.value_and_grad(ce_step)
              
              print("\n[RUN] Beginning Approach B (Hard Targets - Cross-Entropy)")
              for epoch in range(1, 3):
                  total_loss = 0.0
                  for prompt in prompts:
                      tokens = teacher_tok.encode(prompt)
                      input_ids = mx.array([tokens])
                      
                      loss_value, grads = ce_grad_fn(trainable_params, input_ids, tokens)
                      
                      for k in grads.keys():
                          trainable_params[k] = trainable_params[k] - LEARNING_RATE * grads[k]
                          
                      mx.eval(trainable_params)
                      total_loss += loss_value.item()
                  print(f" [EPOCH {epoch:02d}] Total CE Loss: {total_loss:.6f}")

          if __name__ == "__main__":
              run_experiment()
          EOF

          "${VENV_DIR}/bin/python" scripts/faithful_comparison.py
